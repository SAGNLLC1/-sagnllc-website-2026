<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAGN LLC — General Services & Solutions | Government Contractor</title>
<meta name="description" content="SAGN LLC is a woman-owned small business providing janitorial supplies, industrial equipment sourcing, and supply chain solutions to federal, state, and local government agencies in Florida.">
<link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
<link rel="stylesheet" href="./styles.css?v=4">
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="./Icons.jsx?v=4"></script>
<script type="text/babel" src="./Nav.jsx?v=4"></script>
<script type="text/babel" src="./Hero.jsx?v=4"></script>
<script type="text/babel" src="./Section.jsx?v=4"></script>
<script type="text/babel" src="./Cards.jsx?v=4"></script>
<script type="text/babel" src="./Contact.jsx?v=4"></script>
<script type="text/babel" src="./Footer.jsx?v=4"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const CAPSTAT_URL = "./SAGN_LLC_Capability_Statement.pdf";

function App(){
  const [active, setActive] = useState("hero");
  useEffect(() => {
    const ids = ["hero","about","services","differentiators","past-performance","company-data","contact"];
    const onScroll = () => {
      const y = window.scrollY + 120;
      let cur = "hero";
      for (const id of ids){ const el = document.getElementById(id); if (el && el.offsetTop <= y) cur = id; }
      setActive(cur);
    };
    window.addEventListener("scroll", onScroll, { passive:true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  const scrollTo = (id) => { const el = document.getElementById(id); if (el) window.scrollTo({ top: el.offsetTop - 60, behavior:"smooth" }); };
  const toast = (msg) => { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2200); };

  const services = [
    { icon:<IconCog/>, title:"Industrial Equipment Sourcing & Procurement", body:"Procurement and delivery of industrial equipment, machinery, safety supplies, and facility maintenance materials through our vetted supplier network.", naics:"NAICS 423840" },
    { icon:<IconTrash/>, title:"Cleaning Equipment & Janitorial Supply", body:"Sourcing and delivery of janitorial products, cleaning supplies, sanitation materials, and service establishment equipment for government facilities. Supply fulfillment only — no cleaning services performed.", naics:"NAICS 423850" },
    { icon:<IconFile/>, title:"Office Supplies & Paper Products", body:"Procurement and delivery of office supplies, paper products, breakroom essentials, and general-use commodities. Fast turnaround on quotes with competitive government pricing.", naics:"NAICS 424120" },
    { icon:<IconShield/>, title:"TAA & Berry Amendment Compliant Sourcing", body:"Strict TAA and Berry Amendment compliance verified on every quote, with country-of-origin documentation and audit-ready procurement records.", naics:"Cross-cutting" },
    { icon:<IconTrend/>, title:"Vendor Sourcing & Quote Management", body:"Vendor identification, price comparison, and supply chain coordination. Fast, compliant RFQ responses with competitive pricing across all product lines.", naics:"Cross-cutting" },
    { icon:<IconCheck/>, title:"Purchase Order Processing", body:"End-to-end purchase order processing and procurement documentation for federal, state, and local agencies — handled with full transparency and audit-ready records.", naics:"Cross-cutting" },
    { icon:<IconStar/>, title:"Micro-Purchase & GPC Transactions", body:"Government purchase card and micro-purchase support, plus full PO processing for small and large orders alike. No transaction is too small.", naics:"Cross-cutting" },
    { icon:<IconFlag/>, title:"Federal, State & Local Supply Fulfillment", body:"Supply fulfillment across all government tiers — from federal agencies on DLA DIBBS to Florida state and local procurement systems.", naics:"Cross-cutting" },
  ];
  const diffs = [
    { num:"01", title:"Women-Owned Small Business", body:"WOSB certification in progress with the SBA. Eligible for woman-owned set-aside opportunities and supplier diversity goals." },
    { num:"02", title:"SAM.gov Registered, CAGE Active", body:"Active SAM.gov registration with CAGE Code 125K5 — ready to perform immediately. No onboarding lag." },
    { num:"03", title:"Owner-Operated Accountability", body:"Direct accountability on every order, every time. No staff rotation, no handoffs — you always know who is responsible." },
    { num:"04", title:"Rapid Turnaround", body:"No layers of management slowing response time. Quotes returned quickly, POs processed without delay." },
    { num:"05", title:"Strict Compliance Discipline", body:"TAA and Berry Amendment compliance verified across all product lines. Country-of-origin documentation on every order." },
    { num:"06", title:"Local Florida Presence", body:"Miami-Dade County Local Business Tax receipt holder — April 2026. Committed to long-term agency relationships in South Florida." },
    { num:"07", title:"Flexible Order Sizing", body:"Procurement support from micro-purchases through large multi-line orders. No transaction is too small or too complex." },
  ];

  return (<>
    <Nav active={active} onNavigate={scrollTo} />
    <Hero
      onPrimary={() => { window.open(CAPSTAT_URL, "_blank"); toast("Opening Capability Statement…"); }}
      onSecondary={() => scrollTo("contact")} />

    <Section id="about" label="About Us" title="Built to Serve. Ready to Deliver.">
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:48, alignItems:"start"}} className="about-grid">
        <div>
          <p style={{marginBottom:16, color:"var(--text-secondary)", lineHeight:1.75}}>SAGN LLC is a Miami-Dade based, woman-owned small business founded by Joanne Seepersad. We specialize in dependable general services and supply chain solutions for federal, state, and local government agencies.</p>
          <p style={{marginBottom:16, color:"var(--text-secondary)", lineHeight:1.75}}>From supply sourcing and procurement fulfillment to grounds maintenance coordination, SAGN LLC offers the agility of a small business with the professionalism that government contracts demand. We are SAM.gov registered, listed on MyFloridaMarketPlace, and prepared to accept purchase orders through standard government procurement channels.</p>
          <p style={{color:"var(--text-secondary)", lineHeight:1.75}}>We welcome teaming arrangements and mentor-protégé partnerships with established primes.</p>
        </div>
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
          {[
            { i:<IconCheck/>, t:"SAM.gov Registered" },
            { i:<IconStar/>,  t:"Woman-Owned Small Business", s:"SBA WOSB cert in progress" },
            { i:<IconFlag/>,  t:"Florida Registered Vendor" },
            { i:<IconShield/>,t:"Small Business" },
            { i:<IconStar/>,  t:"Military Spouse-Owned" },
          ].map((b,i) => (
            <div key={i} style={{display:"flex", alignItems:"center", gap:10, background:"var(--sky)", borderRadius:8, padding:"14px 16px", fontSize:".85rem", fontWeight:600, color:"var(--navy)"}}>
              <div style={{width:36, height:36, borderRadius:"50%", background:"var(--blue)", color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0}}>{b.i}</div>
              <div>{b.t}{b.s && <div style={{fontSize:".72rem", fontWeight:400, color:"var(--text-light)"}}>{b.s}</div>}</div>
            </div>
          ))}
        </div>
      </div>
    </Section>

    <Section sky id="services" label="Core Competencies" title="What We Do" desc="Focused service lines backed by hands-on experience and an established supplier network.">
      <div className="services-grid">{services.map((s,i) => <ServiceCard key={i} {...s} />)}</div>
    </Section>

    <Section dark id="differentiators" label="Our Advantage" title="Why Partner with SAGN LLC" desc="The agility and accountability of an owner-operated firm, backed by established supplier relationships.">
      <div className="diff-grid">{diffs.map((d,i) => <DiffCard key={i} {...d} />)}</div>
    </Section>

    <Section sky id="past-performance" label="Past Performance" title="A Track Record of Reliability" desc="Thirteen years of vendor management and high-volume transaction processing — the foundation behind SAGN LLC's procurement discipline.">
      <div style={{display:"grid", gridTemplateColumns:"1fr 1.4fr", gap:32, alignItems:"start"}} className="about-grid">
        <div style={{background:"#fff", border:"1px solid var(--border)", borderRadius:"var(--radius-lg)", padding:"28px"}}>
          <div style={{fontSize:".75rem", fontWeight:700, color:"var(--blue)", letterSpacing:".1em", textTransform:"uppercase", marginBottom:8}}>1997 — 2010 · 13 Years</div>
          <h3 style={{fontFamily:"var(--font-display)", fontSize:"1.4rem", color:"var(--navy)", marginBottom:6}}>Winn-Dixie Stores, Inc.</h3>
          <div style={{fontSize:".95rem", color:"var(--text-secondary)", fontWeight:500, marginBottom:20}}>Assistant Front-End Manager</div>
          <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
            <span className="naics-tag">Vendor Management</span>
            <span className="naics-tag">Bookkeeping</span>
            <span className="naics-tag">Inventory</span>
            <span className="naics-tag">Compliance</span>
          </div>
        </div>
        <div style={{background:"#fff", border:"1px solid var(--border)", borderRadius:"var(--radius-lg)", padding:"28px"}}>
          <h3 style={{fontSize:"1rem", fontWeight:700, color:"var(--navy)", marginBottom:16}}>Scope &amp; Responsibilities</h3>
          <ul className="data-list" style={{display:"flex", flexDirection:"column", gap:4}}>
            <li>Managed daily bookkeeping, vendor payments &amp; cash reconciliation</li>
            <li>Coordinated with product suppliers; tracked inventory purchasing activity</li>
            <li>Oversaw high-volume transaction processing in a multi-department environment</li>
            <li>Supervised customer service operations; enforced compliance with policy</li>
            <li>Demonstrated 13 years of reliability in financial &amp; vendor management</li>
          </ul>
        </div>
      </div>
    </Section>

    <Section id="company-data" label="Company Data" title="Contractor Information" desc="Everything a contracting officer needs to verify, register, and order.">
      <div className="data-grid">
        <DataCard title="Identifiers">
          <DataRow label="CAGE Code" value="125K5" />
          <DataRow label="UEI" value="KMFNA8MUCQ69" />
          <DataRow label="DUNS" value="145316313" />
        </DataCard>
        <DataCard title="NAICS Codes">
          <ul className="data-list">
            <li><span className="data-naics-code">423840</span> Industrial Machinery &amp; Equipment</li>
            <li><span className="data-naics-code">423850</span> Service Establishment Equipment</li>
            <li><span className="data-naics-code">424120</span> Stationery &amp; Office Supplies</li>
          </ul>
        </DataCard>
        <DataCard title="Designations">
          <ul className="data-list">
            <li>Small Business</li>
            <li>Woman-Owned Small Business (WOSB in progress)</li>
            <li>Florida Registered LLC</li>
            <li>Miami-Dade Local Business Tax receipt — April 2026</li>
          </ul>
        </DataCard>
        <DataCard title="Registered Platforms">
          <ul className="data-list">
            <li>SAM.gov</li><li>DLA DIBBS</li><li>OpenGov</li>
            <li>MyFloridaMarketPlace</li><li>Miami-Dade Vendor Registry</li>
            <li>Broward County School District</li>
          </ul>
        </DataCard>
        <DataCard title="How to Order">
          <p style={{fontSize:".88rem", color:"var(--text-secondary)", lineHeight:1.65}}>Purchase orders accepted through MyFloridaMarketPlace, OpenGov, DLA DIBBS, and open market procurement.</p>
          <a className="btn btn-primary" href={CAPSTAT_URL} target="_blank" rel="noopener" style={{marginTop:14, fontSize:".82rem", padding:"10px 18px"}}>
            <IconDownload /> Download Capability Statement
          </a>
        </DataCard>
        <DataCard title="Service Area">
          <p style={{fontSize:".88rem", color:"var(--text-secondary)", lineHeight:1.65}}>Florida &amp; Southeast United States.</p>
          <p style={{fontSize:".82rem", color:"var(--text-light)", marginTop:8}}>HQ: Homestead, FL — within 30 miles of major government installations in Miami-Dade and Broward counties.</p>
        </DataCard>
      </div>
    </Section>

    <Section id="contact" label="Get Started" title="Contact Us" desc="Ready to discuss your requirements? We respond to all inquiries within one business day.">
      <div className="contact-grid">
        <div><ContactInfo /></div>
        <ContactForm onSubmit={() => toast("Message sent — we’ll reply within one business day")} />
      </div>
    </Section>

    <Footer />
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
